<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Amex CSV</title>
</head>
<body>
    <h1>Import Amex CSV</h1>

    <p>Upload an Amex CSV and choose which existing account it belongs to.</p>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Preview import</button>
    </form>

    <p><a href="/">Back to homepage</a></p>
</body>
</html>
